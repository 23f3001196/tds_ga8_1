name: Secret Hash Chain
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: "marker-4ff828a6-setup"
        run: echo "marker=4ff828a6"

      - name: Compute hash chain
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
        run: |
          # FIXED: -n removes trailing newline!
          VERIFY_HASH=$(echo -n "${MY_SECRET}github-verified" | sha256sum | cut -c1-10)
          echo "Full hash: $(echo -n \"${MY_SECRET}github-verified\" | sha256sum)"
          echo "Verify hash: ${VERIFY_HASH}"
          echo "${VERIFY_HASH}" > verify_hash.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: verify-hash-4ff828a6
          path: verify_hash.txt
